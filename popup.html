<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InboxSignal</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup" role="main">
      <section class="privacy" aria-label="Privacy">
        <div class="privacyTitle">100% local</div>
        <div class="privacyBody">No data leaves your browser.</div>
      </section>

      <section class="tuning" aria-label="Local tuning">
        <div class="signalCount" id="signalCount">Tuned with 0 signals from your inbox.</div>
        <div class="tuningNote">Useful and Not useful clicks tune ranking on this device.</div>
      </section>
    </main>
    <script src="src/popup.js"></script>
  </body>
</html>
